<IfModule mod_ssl.c>
<VirtualHost *:443>
  ServerName femt.llc
  ServerAlias www.femt.llc

  ProxyPreserveHost On
  RequestHeader set X-Forwarded-Proto "https"
  RequestHeader set X-Forwarded-Port "443"
  RequestHeader set X-Forwarded-Host "%{HTTP_HOST}s"

  ProxyPass /ws/ ws://127.0.0.1:8082/ws/ retry=0
  ProxyPassReverse /ws/ ws://127.0.0.1:8082/ws/

  ProxyPass /socket.io/ ws://127.0.0.1:8082/socket.io/ retry=0
  ProxyPassReverse /socket.io/ ws://127.0.0.1:8082/socket.io/

  ProxyPass /signal/ ws://127.0.0.1:8082/signal/ retry=0
  ProxyPassReverse /signal/ ws://127.0.0.1:8082/signal/

  ProxyPass /realtime/ ws://127.0.0.1:8082/realtime/ retry=0
  ProxyPassReverse /realtime/ ws://127.0.0.1:8082/realtime/

  ProxyPass /live/ ws://127.0.0.1:8082/live/ retry=0
  ProxyPassReverse /live/ ws://127.0.0.1:8082/live/

  ProxyPass /rtc/ ws://127.0.0.1:8082/rtc/ retry=0
  ProxyPassReverse /rtc/ ws://127.0.0.1:8082/rtc/

  ProxyPass /presence/ ws://127.0.0.1:8082/presence/ retry=0
  ProxyPassReverse /presence/ ws://127.0.0.1:8082/presence/

  ProxyPass /api/ http://127.0.0.1:8082/api/ retry=0
  ProxyPassReverse /api/ http://127.0.0.1:8082/api/

  ProxyPass / http://127.0.0.1:8082/ retry=0
  ProxyPassReverse / http://127.0.0.1:8082/

  ErrorLog /femt_error.log
  CustomLog /femt_access.log combined

  Include /etc/letsencrypt/options-ssl-apache.conf
  SSLCertificateFile /etc/letsencrypt/live/femt.llc/fullchain.pem
  SSLCertificateKeyFile /etc/letsencrypt/live/femt.llc/privkey.pem
</VirtualHost>
</IfModule>
