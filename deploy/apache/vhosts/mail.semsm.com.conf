<VirtualHost *:80>
  ServerName mail.semsm.com

  Alias /.well-known/acme-challenge/ /var/www/certbot/.well-known/acme-challenge/
  <Directory /var/www/certbot/.well-known/acme-challenge/>
    Require all granted
  </Directory>

  RewriteEngine On
  RewriteCond %{REQUEST_URI} !^/\.well-known/acme-challenge/
  RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [R=301,L]
</VirtualHost>

<VirtualHost *:443>
  ServerName mail.semsm.com

  SSLEngine on
  SSLCertificateFile /etc/letsencrypt/live/mail.semsm.com/fullchain.pem
  SSLCertificateKeyFile /etc/letsencrypt/live/mail.semsm.com/privkey.pem

  ProxyPreserveHost On
  RequestHeader set X-Forwarded-Proto "https"
  RequestHeader set X-Forwarded-Port "443"
  RequestHeader set X-Forwarded-Host "mail.semsm.com"

  # Replace the upstream below with your iRedAdmin/webmail upstream.
  # Example: http://127.0.0.1:8080/
  ProxyPass / http://127.0.0.1:8080/
  ProxyPassReverse / http://127.0.0.1:8080/
</VirtualHost>
