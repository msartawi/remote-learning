<VirtualHost *:80>
  ServerName auth.femt.llc

  Alias /.well-known/acme-challenge/ /var/www/certbot/.well-known/acme-challenge/
  <Directory /var/www/certbot/.well-known/acme-challenge/>
    Require all granted
  </Directory>

  RewriteEngine On
  RewriteCond %{REQUEST_URI} !^/\.well-known/acme-challenge/
  RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [R=301,L]
</VirtualHost>

<VirtualHost *:443>
  ServerName auth.femt.llc

  SSLEngine on
  SSLCertificateFile /etc/letsencrypt/live/auth.femt.llc/fullchain.pem
  SSLCertificateKeyFile /etc/letsencrypt/live/auth.femt.llc/privkey.pem

  ProxyPreserveHost On
  RequestHeader set X-Forwarded-Proto "https"
  RequestHeader set X-Forwarded-Port "443"
  RequestHeader set X-Forwarded-Host "auth.femt.llc"

  ProxyPass / http://127.0.0.1:8085/
  ProxyPassReverse / http://127.0.0.1:8085/
</VirtualHost>
